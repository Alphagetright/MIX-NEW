<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 — 唐诗意象智能分析系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrapper {
      width: 420px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: #fff;
      text-align: center;
      padding: 40px 30px 30px;
    }
    .login-header .logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 16px;
    }
    .login-header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 2px;
    }
    .login-header p {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 8px;
    }
    .login-body {
      padding: 36px 40px 40px;
    }
    .form-group {
      margin-bottom: 22px;
    }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .form-group input:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 2px;
      transition: filter 0.25s, transform 0.15s;
      margin-top: 8px;
    }
    .btn-login:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }
    .error-msg {
      background: #fef0f0;
      border: 1px solid #fde2e2;
      color: #e74c3c;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
    }
    .login-footer {
      text-align: center;
      padding: 0 40px 36px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-header">
      <div class="logo">唐</div>
      <h1>唐诗意象智能分析系统</h1>
      <p>Tang Poetry Imagery Analysis System</p>
    </div>
    <div class="login-body">
      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" name="username" placeholder="请输入用户名" required autofocus>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn-login">登 录</button>
      </form>
    </div>
    <div class="login-footer">
      还没有账号？<a href="/register" style="color:#3498db;">立即注册</a>
      <span style="margin:0 8px;">|</span> V1.0 · 唐诗意象认知诗学研究平台
    </div>
  </div>
</body>
</html>
