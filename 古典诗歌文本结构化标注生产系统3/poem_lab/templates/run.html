{% extends "base.html" %}
{% block title %}批量运行 — 古典诗歌文本结构化标注生产系统{% endblock %}

{% block content %}
<h1>批量运行</h1>
<p class="subtitle">使用确认的标注方案批量处理全部诗歌</p>

<div id="no-data" class="card">
    <p>尚未确认标注方案，请先到 <a href="/review">审核确认</a> 页面完成审核。</p>
</div>

<div id="run-content" style="display:none">
    <div class="card">
        <h2>运行状态</h2>
        <div class="progress-bar-wrap">
            <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>
        <p id="progress-text">等待开始...</p>
        <p id="progress-detail" class="hint"></p>
    </div>

    <div class="card">
        <h2>当前处理</h2>
        <div id="current-poem" class="current-poem"></div>
    </div>

    <div class="card" id="results-card" style="display:none">
        <h2>运行结果</h2>
        <div id="results-summary"></div>
        <div class="table-wrap" style="max-height:400px; overflow-y:auto;">
            <table class="data-table" id="results-table">
                <thead><tr><th>编号</th><th>标题</th><th>作者</th><th>状态</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="export-links" style="margin-top:12px;"></div>
    </div>

    <div class="card" style="text-align:center">
        <button class="btn btn-primary btn-lg" id="btn-start" onclick="startBatch()">开始批量运行</button>
        <a href="/history" class="btn">查看导出历史</a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const schemaData = JSON.parse(sessionStorage.getItem('schema_result') || 'null');

window.onload = function() {
    if (schemaData) {
        document.getElementById('no-data').style.display = 'none';
        document.getElementById('run-content').style.display = '';
    }
};

function startBatch() {
    const btn = document.getElementById('btn-start');
    btn.disabled = true; btn.textContent = '运行中...';
    document.getElementById('results-card').style.display = '';

    const evtSource = new EventSource('/api/batch-run');

    evtSource.onmessage = function(e) {
        const d = JSON.parse(e.data);

        if (d.error) {
            toast(d.error, false);
            btn.disabled = false; btn.textContent = '重新开始';
            evtSource.close();
            return;
        }

        if (d.done) {
            document.getElementById('progress-bar').style.width = '100%';
            document.getElementById('progress-text').textContent = `完成！成功 ${d.success_count} / ${d.total} 首`;
            document.getElementById('export-links').innerHTML = `
                <a href="/api/export/csv/${d.csv_file}" class="btn">下载 CSV</a>
                <a href="/api/export/json/${d.json_file}" class="btn">下载 JSON</a>`;
            btn.disabled = false; btn.textContent = '重新运行';
            evtSource.close();
            return;
        }

        const pct = Math.round(d.current / d.total * 100);
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('progress-text').textContent = `处理中 ${d.current} / ${d.total}（${pct}%）`;
        document.getElementById('progress-detail').textContent =
            `速度 ${d.rate} 首/分钟 | 预计剩余 ${Math.floor(d.eta/60)}分${d.eta%60}秒`;

        const tbody = document.querySelector('#results-table tbody');
        const row = tbody.querySelector(`tr[data-no="${d.no}"]`);
        if (!row) {
            tbody.insertAdjacentHTML('beforeend',
                `<tr data-no="${d.no}"><td>${d.no}</td><td>${d.title}</td><td></td><td>${d.success ? '✅' : '❌'}</td></tr>`);
        } else {
            row.cells[3].textContent = d.success ? '✅' : '❌';
        }
    };

    evtSource.onerror = function() {
        evtSource.close();
        btn.disabled = false; btn.textContent = '重新开始';
    };
}
</script>
{% endblock %}
