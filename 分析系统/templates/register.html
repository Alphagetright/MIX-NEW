<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>注册 — 唐诗意象智能分析系统</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrapper {
      width: 420px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #2c3e50, #3498db);
      color: #fff;
      text-align: center;
      padding: 36px 30px 28px;
    }
    .header .logo {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: rgba(255,255,255,0.2);
      display: inline-flex;
      align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800;
      margin-bottom: 12px;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header p { font-size: 13px; opacity: 0.8; margin-top: 6px; }
    .body { padding: 32px 40px 36px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 14px; font-weight: 600;
      color: #2c3e50; margin-bottom: 8px;
    }
    .form-group input {
      width: 100%; padding: 12px 16px;
      border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 15px; outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .form-group input:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52,152,219,0.15);
    }
    .hint { font-size: 12px; color: #999; margin-top: 4px; }
    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: #fff; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      letter-spacing: 2px; transition: 0.25s; margin-top: 6px;
    }
    .btn:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .error-msg {
      background: #fef0f0; border: 1px solid #fde2e2;
      color: #e74c3c; text-align: center; padding: 10px;
      border-radius: 8px; margin-bottom: 16px; font-size: 13px;
    }
    .success-msg {
      background: #eafaf1; border: 1px solid #d5f5e3;
      color: #27ae60; text-align: center; padding: 10px;
      border-radius: 8px; margin-bottom: 16px; font-size: 13px;
    }
    .footer {
      text-align: center; padding: 0 40px 32px; font-size: 13px; color: #999;
    }
    .footer a { color: #3498db; text-decoration: none; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="logo">唐</div>
      <h1>创建新账号</h1>
      <p>加入唐诗意象认知诗学研究平台</p>
    </div>
    <div class="body">
      {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
      {% if success %}<div class="success-msg">{{ success }}</div>{% endif %}
      <form method="post">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" name="username" placeholder="字母和数字，2-20个字符" required autofocus>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" placeholder="至少4个字符" required>
          <div class="hint">密码经过加密存储，请放心使用</div>
        </div>
        <button type="submit" class="btn">注 册</button>
      </form>
    </div>
    <div class="footer">
      已有账号？<a href="/login">立即登录</a>
    </div>
  </div>
</body>
</html>
