<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 诗歌标注生产系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', '宋体', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #fff; border-radius: 12px; padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .login-box h2 { text-align: center; color: #1a1a2e; margin-bottom: 8px; font-size: 22px; }
        .login-box .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 30px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #0f3460; }
        .btn { width: 100%; padding: 11px; background: #0f3460; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; transition: background 0.3s; }
        .btn:hover { background: #1a4a7a; }
        .error { background: #fff0f0; color: #d32f2f; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; text-align: center; }
        .link { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
        .link a { color: #0f3460; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>古典诗歌标注平台</h2>
        <p class="subtitle">结构化标注生产系统 v1.0</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">登 录</button>
        </form>
        <div class="link">
            还没有账号？<a href="{{ url_for('register') }}">立即注册</a>
        </div>
    </div>
</body>
</html>
